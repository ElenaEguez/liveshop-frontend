<div class="flex justify-center items-center h-screen bg-gray-100">
  <mat-card class="w-96 p-6">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput type="email" formControlName="email" required>
          <mat-error *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">El correo electrónico es obligatorio.</span>
            <span *ngIf="email?.errors?.['email']">Ingrese un correo electrónico válido.</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" required>
          <mat-error *ngIf="password?.invalid && password?.touched">
            La contraseña es obligatoria.
          </mat-error>
        </mat-form-field>

        <div *ngIf="errorMessage" class="text-red-500 mb-4">
          {{ errorMessage }}
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid" class="w-full">
          Iniciar Sesión
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
