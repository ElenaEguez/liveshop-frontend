<h2 mat-dialog-title>Registrar Gasto</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="gasto-form">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Fecha</mat-label>
        <input matInput type="date" formControlName="fecha">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Monto (Bs.)</mat-label>
        <input matInput type="number" formControlName="monto" min="0.01">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Concepto</mat-label>
      <input matInput formControlName="concepto" placeholder="Ej: Pago de alquiler">
    </mat-form-field>

    <!-- Categoría -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Categoría de gasto</mat-label>
      <mat-select formControlName="categoria">
        <mat-option [value]="null">Sin categoría</mat-option>
        <mat-option *ngFor="let c of categorias" [value]="c.id">{{ c.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Notas</mat-label>
      <textarea matInput formControlName="notas" rows="2"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary"
          [disabled]="form.invalid || loading"
          (click)="guardar()">
    <mat-spinner *ngIf="loading" diameter="18" style="display:inline-block"></mat-spinner>
    <span *ngIf="!loading">Registrar Gasto</span>
  </button>
</mat-dialog-actions>
