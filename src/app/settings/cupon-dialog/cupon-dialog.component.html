<h2 mat-dialog-title>{{ isEdit ? 'Editar' : 'Nuevo' }} Cupón</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="cupon-form">
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Código</mat-label>
        <input matInput formControlName="codigo" [readonly]="isEdit" style="text-transform:uppercase">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo</mat-label>
        <mat-select formControlName="tipo">
          <mat-option value="porcentaje">Porcentaje (%)</mat-option>
          <mat-option value="monto_fijo">Monto fijo (Bs.)</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Valor</mat-label>
        <input matInput type="number" formControlName="valor" min="0.01">
        <span matSuffix>{{ form.get('tipo')?.value === 'porcentaje' ? '%' : 'Bs.' }}</span>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Usos máximos</mat-label>
        <input matInput type="number" formControlName="usos_maximos" min="1"
               placeholder="Sin límite">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Fecha de vencimiento</mat-label>
      <input matInput type="date" formControlName="fecha_vencimiento">
    </mat-form-field>

    <div class="toggles-row">
      <mat-slide-toggle formControlName="activo">Activo</mat-slide-toggle>
      <mat-slide-toggle formControlName="aplica_live">Aplica en Lives</mat-slide-toggle>
      <mat-slide-toggle formControlName="aplica_pos">Aplica en POS</mat-slide-toggle>
    </div>

    <mat-error *ngIf="error">{{ error }}</mat-error>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || loading" (click)="guardar()">
    <mat-spinner *ngIf="loading" diameter="18" style="display:inline-block"></mat-spinner>
    <span *ngIf="!loading">Guardar</span>
  </button>
</mat-dialog-actions>
